<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page Not Found</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0a0a0a;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
    }
    .emoji { font-size: 4rem; margin-bottom: 20px; }
    h1 { font-size: 2rem; color: #FCD116; margin-bottom: 12px; }
    p { color: #888; margin-bottom: 28px; font-size: 1rem; }
    a {
      color: #FCD116;
      text-decoration: none;
      border: 1px solid #FCD116;
      padding: 10px 24px;
      border-radius: 6px;
      font-weight: 600;
      transition: background 0.2s;
    }
    a:hover { background: #FCD116; color: #000; }
  </style>
</head>
<body>
  <div class="emoji">⚽</div>
  <h1>404 – Page Not Found</h1>
  <p>Looks like this page went out of bounds.<br/>The referee has called it off.</p>
  <a href="/">Back to Predictions</a>
</body>
</html>
